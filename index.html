<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Jailbreak Generator 😈</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ff88;
    font-family:monospace;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    flex-direction:column;
}

#loadingScreen{
    text-align:center;
}

#bar{
    width:300px;
    height:25px;
    border:2px solid #00ff88;
    margin-top:20px;
}

#progress{
    width:0%;
    height:100%;
    background:#00ff88;
    box-shadow:0 0 20px #00ff88;
}

#main{
    display:none;
    text-align:center;
}

button{
    background:black;
    color:#00ff88;
    border:2px solid #00ff88;
    padding:15px 40px;
    font-size:20px;
    cursor:pointer;
    margin-top:20px;
    font-family:monospace;
    transition:0.3s;
}

button:hover{
    background:#00ff88;
    color:black;
    box-shadow:0 0 20px #00ff88;
}

#result{
    margin-top:30px;
    font-size:35px;
    text-shadow:0 0 15px #00ff88;
    animation: glitch 0.2s infinite;
}

@keyframes glitch{
    0%{transform:translate(1px,1px);}
    25%{transform:translate(-1px,2px);}
    50%{transform:translate(2px,-1px);}
    75%{transform:translate(-2px,1px);}
    100%{transform:translate(1px,-2px);}
}
</style>
</head>

<body>

<div id="loadingScreen">

<h1>🤖 AI JAILBREAK GENERATOR 🤖</h1>

<pre id="text">
[BOOTING AI CORE...]
</pre>

<div id="bar">
<div id="progress"></div>
</div>

</div>

<div id="main">

<h1>✅ GENERATOR SELESAI 😈</h1>

<button onclick="startPrank()">MULAI</button>

<div id="result"></div>

</div>

<script>

const progress = document.getElementById("progress");
const text = document.getElementById("text");

const messages = [

"[BOOTING AI CORE...]",
"[BYPASSING FILTER...]",
"[INJECTING PROMPT...]",
"[UNLOCKING DEV MODE...]",
"[GENERATING JAILBREAK...]",
"[ACCESS GRANTED 😈]"

];

let i = 0;
let width = 0;

const interval = setInterval(() => {

width += 20;

progress.style.width = width + "%";

text.innerText = messages[i];

i++;

if(width >= 100){

clearInterval(interval);

setTimeout(() => {

document.getElementById("loadingScreen").style.display = "none";

document.getElementById("main").style.display = "block";

},1000);

}

},1000);

function startPrank(){

document.getElementById("result").innerHTML =
"KALO TOLOL YA TOLOL AJA 😂😂";

}

</script>

</body>
  </html>
